config-version: 2
name: 'aws_cloud_cost'
version: '0.3.2'
require-dbt-version: [">=1.3.0", "<3.0.0"]
profile: aws_cloud_cost

models:
  aws_cloud_cost:
    +schema: aws_cloud_cost
    +materialized: table
    staging:
      +materialized: table
    aws_cloud_cost__daily_overview:
      +catalog: "{{ env_var('AWS_CLOUD_COST_TARGET_CATALOG', 'lakekeeper') }}"
    aws_cloud_cost__daily_instance_report:
      +catalog: "{{ env_var('AWS_CLOUD_COST_TARGET_CATALOG', 'lakekeeper') }}"
    aws_cloud_cost__daily_product_report:
      +catalog: "{{ env_var('AWS_CLOUD_COST_TARGET_CATALOG', 'lakekeeper') }}"

vars:
  aws_cloud_cost_start_date: "1970-01-01"

flags:
  use_catalogs_v2: true
  require_generic_test_arguments_property: true
  send_anonymous_usage_stats: false
